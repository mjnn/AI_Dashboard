services:
  app:
    container_name: ${SERVICE_NAME}
    image: ${IMAGE}
    restart: always
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    env_file:
      - .env.runtime
    environment:
      CSV_DATA_PATH: ${CSV_DATA_PATH:-./data}
      FRONTEND_DIST: /app/frontend/dist
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

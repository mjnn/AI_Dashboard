# AI 座舱埋点看板 — Nginx 反向代理
#
# 后端：127.0.0.1:8011（compose HOST_PORT）
# 公网：http://47.116.180.173/tools/ai-dashboard/

location = /tools/ai-dashboard {
    return 301 /tools/ai-dashboard/;
}

location = /tools/ai-dashboard/api/health {
    proxy_pass http://127.0.0.1:8011/api/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
}

location /tools/ai-dashboard/ {
    client_max_body_size 50m;
    proxy_pass http://127.0.0.1:8011/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /tools/ai-dashboard;
    proxy_connect_timeout 10s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
}
